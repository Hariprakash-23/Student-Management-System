{% extends "students/base.html" %}
{% load static %}

{% block title %}{{ action }} Marks | MySchool{% endblock %}

{% block content %}
<h1><i class="fas fa-chart-line"></i> {{ action }} Marks</h1>

<div class="form-container">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save</button>
            <a href="{% url 'marks-list' %}" class="btn-secondary"><i class="fas fa-times"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
