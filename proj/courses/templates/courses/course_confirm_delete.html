{% extends "students/base.html" %}
{% load static %}

{% block title %}Delete Course | MySchool{% endblock %}

{% block content %}
    <div class="delete-confirm">
        <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: var(--danger);"></i>
        <h2 style="color: white;">Are you sure you want to delete "{{ course.name }}"?</h2>
        <p class="warning">This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-actions" style="justify-content: center;">
                <button type="submit" class="btn-primary" style="background: var(--danger);"><i class="fas fa-trash"></i> Yes, delete</button>
                <a href="{% url 'course-list' %}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}
